services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: speech-therapy-jenkins
    restart: unless-stopped
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ../:/workspace

volumes:
  jenkins_home:
