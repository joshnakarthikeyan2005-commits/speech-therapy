name: CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Frontend
        run: |
          npm ci

      - name: Build Frontend
        run: |
          npm run build

      - name: Check Docker
        run: docker --version

      - name: Build Docker Image
        run: docker build -t my-app .
