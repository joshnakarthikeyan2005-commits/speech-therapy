apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: speech-therapy
data:
  PORT: "3001"
  MONGO_URI: mongodb://mongo:27017/speech
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: speech-therapy
spec:
  selector:
    app: backend
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: speech-therapy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: speech-therapy-backend:latest
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: backend-config
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 20
