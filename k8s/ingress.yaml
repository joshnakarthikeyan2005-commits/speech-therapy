apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: speech-therapy-ingress
  namespace: speech-therapy
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
